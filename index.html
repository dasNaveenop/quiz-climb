<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 പാമ്പും ഗോവണിയും · TEAM QUIZ EDITION</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #14532d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans Malayalam', sans-serif;
            padding: 12px;
        }
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: #2d6a4f;
            border-radius: 50px;
            padding: 25px;
            border: 6px solid #ffd966;
            box-shadow: 0 20px 30px #081c15;
        }
        /* top bar */
        .top-bar {
            background: #fff3cd;
            border-radius: 60px;
            padding: 15px 30px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 4px solid #b5834e;
        }
        .dice-box {
            background: white;
            width: 90px;
            height: 90px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            border: 5px solid #3e2b12;
            box-shadow: 0 8px 0 #6b4f28;
        }
        .roll-btn {
            background: #faa307;
            border: none;
            font-size: 2.3rem;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 60px;
            cursor: pointer;
            border: 5px solid #d00000;
            box-shadow: 0 7px 0 #9d0208;
            color: #000;
            transition: 0.05s linear;
        }
        .roll-btn:active {
            transform: translateY(7px);
            box-shadow: none;
        }
        .roll-btn:disabled {
            opacity: 0.3;
            transform: none;
            box-shadow: 0 7px 0 #9d0208;
            pointer-events: none;
        }
        /* main area */
        .main-area {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        /* board section */
        .board-container {
            flex: 3;
            min-width: 600px;
            background: #b98b5f;
            padding: 25px;
            border-radius: 70px;
            border: 8px solid #7b4f2e;
        }
        .grid-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            aspect-ratio: 1/1;
            background: #e9d6b0;
            border: 5px solid #5e3a1e;
            border-radius: 25px;
            overflow: hidden;
            position: relative;
        }
        .cell {
            border: 1px solid #b48b5a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-color: #f5e7c8;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            background: rgba(255,255,200,0.8);
            padding: 0 5px;
            border-radius: 10px;
            z-index: 2;
            font-size: 0.8rem;
        }
        /* snake & ladder background images - REALISTIC */
        .cell[data-snake="true"] {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M25 75 Q 40 20 80 25%22 stroke=%22%231b4d1f%22 stroke-width=%2216%22 fill=%22none%22 stroke-linecap=%22round%22 /><circle cx=%2285%22 cy=%2223%22 r=%2215%22 fill=%22%23365e24%22 /><circle cx=%2272%22 cy=%2227%22 r=%224%22 fill=%22white%22 /></svg>');
            background-size: cover;
            background-blend-mode: overlay;
        }
        .cell[data-ladder="true"] {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2230%22 y=%2210%22 width=%229%22 height=%2280%22 fill=%22%23a45d2b%22 /><rect x=%2262%22 y=%2210%22 width=%229%22 height=%2280%22 fill=%22%238a4a1f%22 /><rect x=%2225%22 y=%2222%22 width=%2250%22 height=%229%22 fill=%22%23c18b4a%22 /><rect x=%2225%22 y=%2242%22 width=%2250%22 height=%229%22 fill=%22%23c18b4a%22 /><rect x=%2225%22 y=%2262%22 width=%2250%22 height=%229%22 fill=%22%23c18b4a%22 /></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .token {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 3px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
            z-index: 20;
            box-shadow: 0 3px 5px black;
        }
        /* right panel - TEAMS and SCORE */
        .teams-panel {
            flex: 1;
            min-width: 280px;
            background: #f5e3b9;
            border-radius: 60px;
            padding: 25px 20px;
            border: 6px solid #ad7a4b;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .teams-header {
            background: #2d6a4f;
            color: white;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            border: 4px solid #ffba08;
        }
        .team-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .team-btn {
            padding: 20px;
            font-size: 2rem;
            font-weight: 700;
            border: 5px solid #000;
            border-radius: 50px;
            background: #ccc;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 7px 0 #5e4a2b;
            transition: 0.03s linear;
        }
        .team-btn:active {
            transform: translateY(7px);
            box-shadow: none;
        }
        .team-btn.disabled-team {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .team-color-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid black;
        }
        .score-list {
            background: #cab577;
            border-radius: 40px;
            padding: 20px;
            font-size: 1.7rem;
            font-weight: 600;
            border: 4px solid #61481c;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            background: #fff9e6;
            padding: 12px 20px;
            border-radius: 40px;
        }
        .winner-banner {
            background: gold;
            border: 8px solid #b8860b;
            border-radius: 60px;
            padding: 30px;
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .reset-btn {
            background: #dc2f2f;
            color: white;
            font-size: 1.5rem;
            padding: 15px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 6px solid #7d1616;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <!-- main game UI -->
    <div id="mainGame">
        <!-- top turn/dice panel -->
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="font-size: 2.2rem;">🎲</span>
                <span id="turnDisplay" style="font-size: 2rem; font-weight: 600;">Select team</span>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="dice-box" id="diceValue">⚀</div>
                <button class="roll-btn" id="rollDiceBtn" disabled>ROLL</button>
            </div>
            <button class="reset-btn" id="resetGameBtn">🔄 RESET</button>
        </div>

        <!-- main play area -->
        <div class="main-area">
            <!-- SNAKE & LADDER BOARD -->
            <div class="board-container">
                <div id="gameBoard" class="grid-board"></div>
            </div>

            <!-- TEAMS PANEL with BUTTONS and SCORE -->
            <div class="teams-panel">
                <div class="teams-header">👥 TEAMS</div>
                <div id="teamButtonsContainer" class="team-buttons">
                    <!-- dynamic team buttons will appear here -->
                </div>
                <div style="font-size: 2rem; font-weight: 700; margin-top: 10px;">📊 SCORE</div>
                <div id="scoreList" class="score-list"></div>
                <div id="winnerMessage" class="winner-banner hidden"></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- CONFIG ----------
        // Simple snake & ladder mapping (only snakes & ladders, NO power tiles)
        const SNAKES = {
            16: 6,   47: 26,  49: 11,  56: 53,  62: 19,
            64: 60,  87: 24,  93: 73,  95: 75,  98: 78
        };
        const LADDERS = {
            2: 38,   7: 14,   8: 31,   15: 26,  21: 42,
            28: 84,  36: 44,  51: 67,  71: 91,  78: 98,  87: 94  // 87 ladder dominates snake (intentional)
        };

        // Teams data - 6 teams max
        let teams = [];
        let currentTeamId = null;          // which team is currently selected (by button press)
        let currentTurnIndex = 0;           // for turn order after dice roll (extra turn logic)
        let gameActive = false;
        let winnerId = null;
        let extraTurn = false;              // rolled 6?

        // ---------- HELPER ----------
        function applySnakesLadders(pos) {
            let newPos = pos;
            if (SNAKES[pos]) newPos = SNAKES[pos];
            if (LADDERS[pos]) newPos = LADDERS[pos];   // ladder overrides snake
            return newPos;
        }

        // ---------- RENDER BOARD ----------
        function renderBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';
            for (let row = 10; row >= 1; row--) {
                for (let col = 0; col < 10; col++) {
                    let cellNum = row * 10 - col;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.num = cellNum;

                    // snake or ladder attributes for background
                    if (SNAKES[cellNum]) cell.dataset.snake = 'true';
                    if (LADDERS[cellNum]) cell.dataset.ladder = 'true';

                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'cell-number';
                    numberSpan.innerText = cellNum;
                    cell.appendChild(numberSpan);

                    // place tokens for teams on this cell
                    teams.forEach(team => {
                        if (team.position === cellNum) {
                            const token = document.createElement('div');
                            token.className = 'token';
                            token.style.backgroundColor = team.color;
                            cell.appendChild(token);
                        }
                    });

                    boardEl.appendChild(cell);
                }
            }
        }

        // update scoreboard + team buttons
        function updateUI() {
            const scoreDiv = document.getElementById('scoreList');
            scoreDiv.innerHTML = '';
            teams.slice().sort((a,b) => b.position - a.position).forEach(t => {
                const item = document.createElement('div');
                item.className = 'score-item';
                item.innerHTML = `<span><span style="display:inline-block; width:25px; height:25px; border-radius:50%; background:${t.color}; border:2px solid black; margin-right:10px;"></span>${t.name}</span> <span>${t.position}</span>`;
                scoreDiv.appendChild(item);
            });

            // update team buttons (show current turn)
            const btnContainer = document.getElementById('teamButtonsContainer');
            btnContainer.innerHTML = '';
            teams.forEach(team => {
                const btn = document.createElement('div');
                btn.className = `team-btn ${!gameActive || winnerId ? 'disabled-team' : ''}`;
                btn.setAttribute('data-team-id', team.id);
                btn.innerHTML = `<span class="team-color-dot" style="background:${team.color};"></span> ${team.name}`;
                // if game inactive or winner, disable all team clicks
                if (!gameActive || winnerId) {
                    // no click
                } else {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // MANUAL TEAM SELECTION: quiz correct aaya team ne click cheyyuka
                        if (!gameActive || winnerId) return;
                        // enable dice for this team, set as current
                        currentTeamId = team.id;
                        document.getElementById('turnDisplay').innerText = `${team.name}'s turn (roll now)`;
                        document.getElementById('rollDiceBtn').disabled = false;
                    });
                }
                btnContainer.appendChild(btn);
            });

            // update turn display
            if (winnerId) {
                document.getElementById('turnDisplay').innerText = `🏆 WINNER 🏆`;
            } else {
                if (!currentTeamId) document.getElementById('turnDisplay').innerText = 'Select team ↑';
            }
        }

        // dice roll logic
        function rollDiceAndMove() {
            if (!gameActive || winnerId) return;
            if (!currentTeamId) {
                alert('ആദ്യം ടീം സെലക്ട് ചെയ്യൂ! (Select team first)');
                return;
            }
            const team = teams.find(t => t.id === currentTeamId);
            if (!team) return;

            // generate dice
            const dice = Math.floor(Math.random() * 6) + 1;
            const diceMap = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
            document.getElementById('diceValue').innerText = diceMap[dice];

            // sound effect (simple beep)
            try {
                const audio = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                osc.connect(gain).connect(audio.destination);
                gain.gain.setValueAtTime(0.2, audio.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.15);
                osc.frequency.value = 500;
                osc.start();
                osc.stop(audio.currentTime + 0.15);
            } catch(e) {}

            // move team
            let newPos = team.position + dice;
            if (newPos > 100) {
                // can't move beyond 100
            } else {
                team.position = newPos;
                // snake / ladder check
                team.position = applySnakesLadders(team.position);
                if (team.position > 100) team.position = 100;
            }

            // check win
            if (team.position === 100) {
                winnerId = team.id;
                gameActive = false;
                document.getElementById('winnerMessage').classList.remove('hidden');
                document.getElementById('winnerMessage').innerHTML = `🏆 ${team.name} ജയിച്ചു! 🏆`;
                document.getElementById('rollDiceBtn').disabled = true;
            }

            // extra turn on 6?
            if (dice === 6 && !winnerId) {
                extraTurn = true;   // same team again (currentTeamId remains)
            } else {
                extraTurn = false;
                // clear current team -> dice disabled until new team selected
                currentTeamId = null;
                document.getElementById('rollDiceBtn').disabled = true;
                document.getElementById('turnDisplay').innerText = 'Select team ↑';
            }

            renderBoard();
            updateUI();
            saveGame();
        }

        // ------ SAVE / LOAD ------
        function saveGame() {
            if (!gameActive) return;
            const state = {
                teams,
                currentTeamId,
                currentTurnIndex,
                winnerId,
                extraTurn,
                gameActive
            };
            localStorage.setItem('snl_quiz', JSON.stringify(state));
        }

        function loadGame() {
            const saved = localStorage.getItem('snl_quiz');
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                teams = data.teams;
                currentTeamId = data.currentTeamId;
                currentTurnIndex = data.currentTurnIndex || 0;
                winnerId = data.winnerId || null;
                extraTurn = data.extraTurn || false;
                gameActive = data.gameActive;
                if (winnerId) {
                    document.getElementById('winnerMessage').classList.remove('hidden');
                    const winTeam = teams.find(t=>t.id===winnerId);
                    if(winTeam) document.getElementById('winnerMessage').innerHTML = `🏆 ${winTeam.name} ജയിച്ചു! 🏆`;
                    document.getElementById('rollDiceBtn').disabled = true;
                } else {
                    document.getElementById('winnerMessage').classList.add('hidden');
                    if (currentTeamId) {
                        document.getElementById('rollDiceBtn').disabled = false;
                        const ct = teams.find(t=>t.id===currentTeamId);
                        if(ct) document.getElementById('turnDisplay').innerText = `${ct.name}'s turn (roll now)`;
                    } else {
                        document.getElementById('rollDiceBtn').disabled = true;
                    }
                }
                renderBoard();
                updateUI();
                return true;
            } catch (e) { return false; }
        }

        // reset everything
        function fullReset() {
            localStorage.removeItem('snl_quiz');
            // recreate 6 teams (default)
            teams = [
                { id: 1, name: 'ടീം A', color: '#e63946', position: 0 },
                { id: 2, name: 'ടീം B', color: '#1e6091', position: 0 },
                { id: 3, name: 'ടീം C', color: '#52b788', position: 0 },
                { id: 4, name: 'ടീം D', color: '#fb8b24', position: 0 },
                { id: 5, name: 'ടീം E', color: '#9d4edd', position: 0 },
                { id: 6, name: 'ടീം F', color: '#ffb703', position: 0 }
            ];
            currentTeamId = null;
            winnerId = null;
            gameActive = true;
            extraTurn = false;
            document.getElementById('rollDiceBtn').disabled = true;
            document.getElementById('winnerMessage').classList.add('hidden');
            document.getElementById('turnDisplay').innerText = 'Select team ↑';
            renderBoard();
            updateUI();
            saveGame();
        }

        // ----- INITIAL SETUP -----
        function initGame() {
            // default 6 teams
            teams = [
                { id: 1, name: 'ടീം A', color: '#e63946', position: 0 },
                { id: 2, name: 'ടീം B', color: '#1e6091', position: 0 },
                { id: 3, name: 'ടീം C', color: '#52b788', position: 0 },
                { id: 4, name: 'ടീം D', color: '#fb8b24', position: 0 },
                { id: 5, name: 'ടീം E', color: '#9d4edd', position: 0 },
                { id: 6, name: 'ടീം F', color: '#ffb703', position: 0 }
            ];
            gameActive = true;
            winnerId = null;
            currentTeamId = null;
            renderBoard();
            updateUI();
            // try load saved
            if (!loadGame()) {
                saveGame();
            }
        }

        // ----- EVENT LISTENERS -----
        document.getElementById('rollDiceBtn').addEventListener('click', rollDiceAndMove);

        document.getElementById('resetGameBtn').addEventListener('click', () => {
            fullReset();
        });

        // start
        initGame();
    })();
</script>
</body>
</html>
