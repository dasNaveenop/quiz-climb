<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧗 QUIZ CLIMBER · Snake & Ladder · Simple Edition</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1e3a5f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #2c5a7a;
            border-radius: 48px;
            padding: 24px;
            border: 5px solid #ffb347;
        }
        /* turn panel */
        .turn-panel {
            background: #fcf3da;
            border-radius: 60px;
            padding: 20px 30px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 3px solid #aa7c3f;
        }
        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 1.8rem;
        }
        .team-tag {
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 2rem;
            background: white;
            border: 3px solid black;
        }
        .dice-box {
            background: white;
            width: 100px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 800;
            border: 5px solid #3e2b12;
            box-shadow: 0 8px 0 #5a3f1a;
        }
        .roll-btn {
            background: #f5b342;
            border: none;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 60px;
            cursor: pointer;
            border: 4px solid #c57c1a;
            box-shadow: 0 6px 0 #7b4f12;
        }
        .roll-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }
        .roll-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        /* main board */
        .play-area {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .board-wrapper {
            flex: 3;
            min-width: 550px;
            background: #deb887;
            padding: 24px;
            border-radius: 60px;
            border: 6px solid #b57c48;
        }
        .grid-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            aspect-ratio: 1 / 1;
            background: #f2e1c0;
            border: 4px solid #6b4c2c;
            border-radius: 24px;
            overflow: hidden;
        }
        .cell {
            border: 1px solid #9b7b56;
            position: relative;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.9rem;
            background: rgba(255,255,200,0.8);
            padding: 0 4px;
            border-radius: 10px;
        }
        /* snake head/tail */
        .cell[data-snake="true"] { background: #c94f4f; color: white; }
        .cell[data-ladder="true"] { background: #6b8e4c; color: white; }
        .token {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
            box-shadow: 0 2px 4px black;
            z-index: 20;
        }
        /* scoreboard + team select */
        .scoreboard {
            flex: 1;
            min-width: 280px;
            background: #ecdba9;
            border-radius: 40px;
            padding: 24px 18px;
            border: 5px solid #ad7a4b;
        }
        .scoreboard h2 {
            text-align: center;
            background: #3f6123;
            color: white;
            padding: 15px;
            border-radius: 40px;
            font-size: 2.2rem;
        }
        .team-list {
            list-style: none;
            font-size: 1.6rem;
            font-weight: 600;
            margin: 20px 0;
        }
        .team-list li {
            display: flex;
            justify-content: space-between;
            background: #fcf5dd;
            margin: 10px 0;
            padding: 15px 20px;
            border-radius: 40px;
            border: 2px solid #7a623a;
            cursor: pointer;
            transition: 0.2s;
        }
        .team-list li.selected {
            border: 5px solid #ffaa00;
            background: #fff2cc;
            transform: scale(1.02);
        }
        .team-color-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid black;
            display: inline-block;
            margin-right: 15px;
        }
        .winner-overlay {
            background: #ffec9f;
            border-radius: 80px;
            padding: 30px;
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            border: 8px solid gold;
            margin-top: 20px;
        }
        .hidden { display: none !important; }
        .setup-screen {
            background: #a2b38b;
            padding: 50px;
            border-radius: 80px;
        }
        .team-row {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            align-items: center;
            flex-wrap: wrap;
        }
        input { padding: 10px; font-size: 1.4rem; border-radius: 30px; }
    </style>
</head>
<body>
<div id="gameContainer" class="game-container">
    <!-- Setup Panel -->
    <div id="setupPanel" class="setup-screen">
        <h2 style="font-size: 3.5rem; color: #1e3200;">🧗 QUIZ CLIMBER</h2>
        <p style="font-size: 2rem;">Teams (2–6) set cheyyu</p>
        <div id="teamInputs"></div>
        <button id="startGameBtn" class="roll-btn" style="font-size:2.2rem;">🚀 GAME START</button>
    </div>

    <!-- Main Game -->
    <div id="mainGame" class="hidden">
        <div class="turn-panel">
            <div class="turn-indicator">
                <span>🎲 Current:</span>
                <span id="turnTeamTag" class="team-tag">Team 1</span>
            </div>
            <div class="dice-area">
                <div class="dice-box" id="diceValue">⚀</div>
                <button class="roll-btn" id="rollDiceBtn" disabled>ROLL</button>
            </div>
        </div>
        
        <div class="play-area">
            <div class="board-wrapper">
                <div id="gameBoard" class="grid-board"></div>
            </div>
            
            <div class="scoreboard">
                <h2>📊 SCORE</h2>
                <ul id="scoreList" class="team-list"></ul>
                <div style="font-size: 1.8rem; margin-top: 20px; padding: 15px; background: #ffd966; border-radius: 40px; text-align: center;">
                    👆 Quiz answer correct aaya<br>team select cheyyu
                </div>
                <div id="winnerMessage" class="winner-overlay hidden"></div>
                <button id="resetGameBtn" class="roll-btn" style="margin-top: 20px; width: 100%; font-size:1.8rem;">🔄 RESET GAME</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Simple Snake & Ladder - no power tiles, no skip
        let teams = [];
        let currentTeamIndex = 0;
        let gameActive = false;
        let winnerId = null;
        
        // Classic snakes & ladders
        const SNAKES = { 16: 6, 47: 26, 49: 11, 56: 53, 62: 19, 64: 60, 87: 24, 93: 73, 95: 75, 98: 78 };
        const LADDERS = { 2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 78: 98, 87: 94 };

        // Apply snakes/ladders
        function applySnakesLadders(pos) {
            if (SNAKES[pos]) return SNAKES[pos];
            if (LADDERS[pos]) return LADDERS[pos];
            return pos;
        }

        // Render board
        function renderBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';
            for (let i = 100; i >= 1; i -= 10) {
                for (let j = 0; j < 10; j++) {
                    const cellNum = i - j;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.num = cellNum;
                    
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'cell-number';
                    numberSpan.innerText = cellNum;
                    cell.appendChild(numberSpan);
                    
                    if (SNAKES[cellNum]) cell.dataset.snake = 'true';
                    if (LADDERS[cellNum]) cell.dataset.ladder = 'true';

                    // Add team tokens
                    teams.forEach(team => {
                        if (team.position === cellNum) {
                            const token = document.createElement('div');
                            token.className = 'token';
                            token.style.backgroundColor = team.color;
                            token.title = team.name;
                            cell.appendChild(token);
                        }
                    });
                    boardEl.appendChild(cell);
                }
            }
        }

        // Update scoreboard and highlight selected team
        function updateScoreboard(selectedIndex = currentTeamIndex) {
            const list = document.getElementById('scoreList');
            list.innerHTML = '';
            teams.forEach((t, idx) => {
                const li = document.createElement('li');
                li.className = idx === selectedIndex ? 'selected' : '';
                li.dataset.teamIndex = idx;
                li.innerHTML = `<span><span class="team-color-dot" style="background:${t.color};"></span>${t.name}</span> <span>📍 ${t.position}</span>`;
                li.addEventListener('click', () => {
                    // Quiz answer correct team select cheyyum
                    if (!gameActive || winnerId) return;
                    currentTeamIndex = idx;
                    document.getElementById('rollDiceBtn').disabled = false;
                    updateScoreboard(currentTeamIndex);
                    document.getElementById('turnTeamTag').innerText = `${teams[currentTeamIndex].name} roll cheyyu`;
                    document.getElementById('turnTeamTag').style.background = teams[currentTeamIndex].color + 'c0';
                });
                list.appendChild(li);
            });
            
            const turnTag = document.getElementById('turnTeamTag');
            if (teams[currentTeamIndex] && !winnerId) {
                turnTag.innerText = `${teams[currentTeamIndex].name} (click dice)`;
                turnTag.style.background = teams[currentTeamIndex].color + 'c0';
            }
        }

        // Dice roll
        function rollDice() {
            return Math.floor(Math.random() * 6) + 1;
        }

        // Move team
        function moveCurrentTeam() {
            if (!gameActive || winnerId) return;
            
            const team = teams[currentTeamIndex];
            const dice = rollDice();
            
            // Dice display
            const diceMap = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
            document.getElementById('diceValue').innerText = diceMap[dice];
            
            // Move
            let newPos = team.position + dice;
            if (newPos <= 100) {
                team.position = newPos;
                team.position = applySnakesLadders(team.position);
            }
            
            // Check win
            if (team.position === 100) {
                winnerId = team.id;
                gameActive = false;
                document.getElementById('winnerMessage').innerHTML = `🏆 ${team.name} JIT GAYA! 🏆<br><button class="smol-btn" id="playAgainBtn" style="font-size:2rem; padding:15px;">NEW GAME</button>`;
                document.getElementById('winnerMessage').classList.remove('hidden');
                document.getElementById('rollDiceBtn').disabled = true;
            }
            
            renderBoard();
            updateScoreboard(currentTeamIndex);
            
            // Roll button disable until next team select
            document.getElementById('rollDiceBtn').disabled = true;
        }

        // Setup functions
        function setupTeamInputs() {
            let html = '<select id="teamCountSelect" style="font-size:1.8rem; padding:10px;"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>';
            for (let i=1; i<=6; i++) {
                html += `<div class="team-row" id="teamRow${i}" style="display:none;">
                    <span style="font-size:1.8rem;">Team ${i}:</span> 
                    <input type="text" id="teamName${i}" placeholder="Name" value="Team ${i}" style="font-size:1.4rem;"> 
                    <input type="color" id="teamColor${i}" value="#${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}" style="width:60px;height:60px;">
                </div>`;
            }
            document.getElementById('teamInputs').innerHTML = html;
            
            const sel = document.getElementById('teamCountSelect');
            sel.addEventListener('change', () => {
                for(let i=1;i<=6;i++) {
                    document.getElementById(`teamRow${i}`).style.display = i <= parseInt(sel.value) ? 'flex' : 'none';
                }
            });
            sel.dispatchEvent(new Event('change'));
        }
        setupTeamInputs();

        // Start game
        document.getElementById('startGameBtn').addEventListener('click', () => {
            const cnt = parseInt(document.getElementById('teamCountSelect').value);
            teams = [];
            for (let i=1; i<=cnt; i++) {
                const name = document.getElementById(`teamName${i}`).value.trim() || `Team ${i}`;
                const color = document.getElementById(`teamColor${i}`).value;
                teams.push({ id: i, name, color, position: 0 });
            }
            currentTeamIndex = 0;
            winnerId = null;
            gameActive = true;
            
            document.getElementById('winnerMessage').classList.add('hidden');
            document.getElementById('rollDiceBtn').disabled = true; // team select cheyyande?
            renderBoard();
            updateScoreboard(0);
            
            document.getElementById('mainGame').classList.remove('hidden');
            document.getElementById('setupPanel').classList.add('hidden');
        });

        // Roll button
        document.getElementById('rollDiceBtn').addEventListener('click', moveCurrentTeam);

        // Reset
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            if (confirm('Game reset cheyyano?')) {
                document.getElementById('mainGame').classList.add('hidden');
                document.getElementById('setupPanel').classList.remove('hidden');
                gameActive = false;
            }
        });

        // Play again from winner
        document.addEventListener('click', (e) => {
            if (e.target.id === 'playAgainBtn') {
                document.getElementById('mainGame').classList.add('hidden');
                document.getElementById('setupPanel').classList.remove('hidden');
                gameActive = false;
            }
        });
    })();
</script>
</body>
</html>
