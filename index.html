<!DOCTYPE html>
<html>
<head>
  <title>Quiz Climb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
      text-align: center;
    }
    .container {
      margin-top: 100px;
    }
    h1 {
      font-size: 40px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background-color: #00c6ff;
      color: black;
      cursor: pointer;
    }
    button:hover {
      background-color: #0072ff;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QUIZ CLIMB</h1>
    <p>Ready to start your journey?</p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <script>
    function startGame() {
      alert("Game Starting Soon!");
    }
  </script>
</body>
</html>
